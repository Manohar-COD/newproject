# Production profile — loaded when SPRING_PROFILES_ACTIVE=prod
spring.application.name=inventory

# Keep in-memory H2 for now (data resets on each restart).
# Swap to a Render Postgres add-on when persistence is needed:
#   spring.datasource.url=${DATABASE_URL}
#   spring.datasource.driver-class-name=org.postgresql.Driver
#   spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:h2:mem:inventorydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable H2 console in production
spring.h2.console.enabled=false

# Render injects PORT automatically
server.port=${PORT:8080}

# CORS — override with the actual frontend URL via env var
allowed.origins=${ALLOWED_ORIGINS:https://inventory-frontend.onrender.com}
