services:
  # ── Spring Boot Backend (Docker) ─────────────────────────────────────────────
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"
      - key: ALLOWED_ORIGINS
        value: "https://inventory-frontend-fw9z.onrender.com"

  # ── React / Vite Frontend (Static Site) ─────────────────────────────────────
  - type: web
    name: inventory-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://inventory-backend-ko5a.onrender.com/api/products"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
